<style>

        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        direction: ltr;

      }

      }

<body class="bg-background font-body text-on-background min-h-screen flex flex-col">
<!-- Top Navigation Bar (Shared Component Logic) -->
<!-- Suppressed navigation shell items for focused registration, but keeping structure as per rules -->
<nav class="bg-white/80 backdrop-blur-xl shadow-sm docked full-width top-0 sticky z-50">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="text-xl font-bold tracking-tight text-blue-900 font-['Manrope']">
                SimplyBridge
            </div>
<div class="hidden md:flex items-center gap-8 font-['Inter'] text-sm font-medium">
<a class="text-slate-600 hover:text-blue-600 transition-colors" href="#">How it Works</a>
                <a class="text-slate-600 hover:text-blue-600 transition-colors" href="login.html">Login</a>
<a class="bg-primary text-on-primary px-5 py-2 rounded-lg font-semibold hover:opacity-90 transition-opacity" href="#">Join Now</a>
</div>
<!-- Mobile Toggle Placeholder -->
<div class="md:hidden">
<span class="material-symbols-outlined text-on-surface">menu</span>
</div>
</div>
</nav>
<!-- Main Content Area: Centered Registration Form -->
<main class="flex-grow flex items-center justify-center px-6 py-12 md:py-20 relative overflow-hidden">
<!-- Abstract Background Elements (No 1px borders, using tonal shifts) -->
<div class="absolute top-0 right-0 w-96 h-96 bg-primary-fixed opacity-20 rounded-full blur-3xl -mr-48 -mt-48"></div>
<div class="absolute bottom-0 left-0 w-80 h-80 bg-secondary-fixed opacity-20 rounded-full blur-3xl -ml-40 -mb-40"></div>
<div class="w-full max-w-md relative z-10">
<!-- Form Container -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-sm">
<div class="mb-10 text-center">
<h1 class="text-3xl font-bold font-headline text-on-surface tracking-tight mb-2">Create your account</h1>
<p class="text-on-surface-variant text-sm">Join the bridge between talent and vision.</p>
</div>
<form id="register-form" class="space-y-6">
<!-- User Type Selection (Editorial High-end Toggle) -->
<div class="grid grid-cols-2 gap-4 p-1 bg-surface-container-high rounded-xl">
<label class="relative cursor-pointer">
<input checked="" class="peer sr-only" name="user_type" type="radio" value="client"/>
<div class="flex items-center justify-center gap-2 py-3 rounded-lg text-sm font-medium transition-all peer-checked:bg-surface-container-lowest peer-checked:text-primary peer-checked:shadow-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">business_center</span>
                                I am a Client
                            </div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="user_type" type="radio" value="developer"/>
<div class="flex items-center justify-center gap-2 py-3 rounded-lg text-sm font-medium transition-all peer-checked:bg-surface-container-lowest peer-checked:text-primary peer-checked:shadow-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">code</span>
                                I am a Developer
                            </div>
</label>
</div>
<div class="space-y-4">
<!-- Full Name -->
<div>
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-1.5 ml-1" for="name">Full Name</label>
<div class="relative group">
<input class="w-full bg-surface-container-high border-none rounded-lg py-3.5 px-4 focus:ring-0 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline-variant" id="name" placeholder="Alex Rivera" type="text"/>
<div class="absolute left-0 bottom-0 h-0.5 w-0 bg-primary group-focus-within:w-2 transition-all duration-300"></div>
</div>
</div>
<!-- Email -->
<div>
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-1.5 ml-1" for="email">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-high border-none rounded-lg py-3.5 px-4 focus:ring-0 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline-variant" id="email" placeholder="alex@company.com" type="email"/>
<div class="absolute left-0 bottom-0 h-0.5 w-0 bg-primary group-focus-within:w-2 transition-all duration-300"></div>
</div>
</div>
<!-- Password -->
<div>
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-1.5 ml-1" for="password">Password</label>
<div class="relative group">
<input class="w-full bg-surface-container-high border-none rounded-lg py-3.5 px-4 focus:ring-0 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<div class="absolute left-0 bottom-0 h-0.5 w-0 bg-primary group-focus-within:w-2 transition-all duration-300"></div>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full primary-gradient text-on-primary py-4 rounded-xl font-bold text-sm tracking-wide shadow-lg shadow-primary/20 hover:opacity-95 active:scale-[0.98] transition-all" type="submit">
                        Create Account
                    </button>
</form>
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-sm">
                        Already have an account? 
                        <a href="login.html" class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-1">Login</a>
</p>
</div>
</div>
<!-- Trust Badge or Micro-copy -->
<div class="mt-8 flex items-center justify-center gap-6 opacity-60">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="text-[11px] font-medium uppercase tracking-widest">Secure SSL</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]">privacy_tip</span>
<span class="text-[11px] font-medium uppercase tracking-widest">GDPR Ready</span>
</div>
</div>
</div>
</main>
<!-- Footer (Shared Component Logic) -->
<footer class="bg-slate-50 border-t border-slate-200/50 w-full py-12 px-6">
<div class="flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto gap-8">
<div class="text-lg font-bold text-blue-900 font-['Manrope']">
                SimplyBridge
            </div>
<div class="flex gap-8 text-xs font-['Inter'] text-slate-500">
<a class="hover:text-blue-700 transition-colors" href="#">Privacy</a>
<a class="hover:text-blue-700 transition-colors" href="#">Terms</a>
<a class="hover:text-blue-700 transition-colors" href="#">Twitter</a>
<a class="hover:text-blue-700 transition-colors" href="#">LinkedIn</a>
</div>
<div class="text-xs text-slate-500 font-['Inter']">
                © 2024 SimplyBridge. All rights reserved.
            </div>
</div>
</footer>
<script>
    const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
        ? `${window.location.protocol}//${window.location.hostname}:8000`
        : window.location.origin;

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const userType = document.querySelector('input[name="user_type"]:checked').value;

        try {
            const response = await fetch(`${API_BASE_URL}/auth/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    full_name: name,
                    email: email,
                    password: password,
                    role: userType
                })
            });

            const data = await response.json();
            
            if (response.ok) {
                alert('Account created successfully! Please login.');
                window.location.href = 'login.html';
            } else {
                alert(data.detail || 'An error occurred during registration.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Failed to connect to the server. Please try again later.');
        }
    });
</script>
</body></html>

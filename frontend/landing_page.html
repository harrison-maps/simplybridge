<body class="bg-background text-on-surface font-body">

    <!-- Top Navigation Bar -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm">

            <div class="hidden md:flex items-center space-x-8">

                <a href="#" class="font-['Inter'] text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-300 transition-colors">How it Works</a>

                <button onclick="window.location.href='register.html'" class="bg-primary hover:bg-primary-container text-white px-5 py-2 rounded-lg text-sm font-semibold transition-all duration-300 ease-in-out hover:opacity-80">Join Now</button>

    <main class="pt-20">
        <!-- Hero Section -->
        <section class="relative overflow-hidden bg-surface py-24 lg:py-32">
            <div class="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-16 items-center">
                <div class="z-10">
                    <h1 class="font-headline text-5xl lg:text-7xl font-bold text-on-surface leading-[1.1] mb-6 tracking-tight">

                    <p class="text-body-lg text-on-surface-variant max-w-lg mb-10 text-lg leading-relaxed">
                        SimplyBridge connects world-class engineering talent with companies building the future. Scale your team with vetted experts or find your next career-defining project.
                    </p>
                    <div class="flex flex-col sm:flex-row gap-4">
                        <button onclick="window.location.href='developer_directory.html'" class="hero-gradient text-white px-8 py-4 rounded-lg font-bold text-sm tracking-wide shadow-lg hover:shadow-xl transition-all">

                        <button onclick="window.location.href='register.html'" class="text-secondary hover:bg-secondary-fixed/20 px-8 py-4 rounded-lg font-bold text-sm tracking-wide transition-all border border-secondary/20">

                    </div>

                </div>
                
                <div class="grid md:grid-cols-3 gap-8">
                    <!-- Step 1 -->
                    <div class="bg-surface-container-lowest p-10 rounded-xl transition-all duration-300 hover:translate-y-[-4px]">
                        <div class="w-12 h-12 bg-primary-fixed rounded-lg flex items-center justify-center mb-6">
                            <span class="material-symbols-outlined text-primary" data-icon="post_add">post_add</span>
                        </div>
                        <h3 class="font-headline text-xl font-bold mb-3">Post a Project</h3>
                        <p class="text-on-surface-variant text-sm leading-relaxed">Define your requirements and stack. Our AI-driven system analyzes your needs to find the perfect technical match.</p>
                    </div>
                    <!-- Step 2 -->
                    <div class="bg-surface-container-lowest p-10 rounded-xl transition-all duration-300 hover:translate-y-[-4px]">
                        <div class="w-12 h-12 bg-secondary-fixed rounded-lg flex items-center justify-center mb-6">
                            <span class="material-symbols-outlined text-secondary" data-icon="person_search">person_search</span>
                        </div>
                        <h3 class="font-headline text-xl font-bold mb-3">Find Developers</h3>
                        <p class="text-on-surface-variant text-sm leading-relaxed">Browse curated profiles of pre-vetted senior engineers. Review their previous work, ratings, and specialized skill sets.</p>
                    </div>
                    <!-- Step 3 -->
                    <div class="bg-surface-container-lowest p-10 rounded-xl transition-all duration-300 hover:translate-y-[-4px]">
                        <div class="w-12 h-12 bg-tertiary-fixed rounded-lg flex items-center justify-center mb-6">
                            <span class="material-symbols-outlined text-tertiary" data-icon="handshake">handshake</span>
                        </div>
                        <h3 class="font-headline text-xl font-bold mb-3">Seamless Collaboration</h3>
                        <p class="text-on-surface-variant text-sm leading-relaxed">Onboard your talent instantly. Use our built-in tools for milestone tracking, secure payments, and daily stand-ups.</p>

                </div>

                                    <p class="text-xs text-on-surface-variant font-medium">Full-Stack Architect</p>

                                <div class="flex items-center gap-1 bg-surface-container px-2 py-1 rounded">
                                    <span class="material-symbols-outlined text-sm text-tertiary" style="font-variation-settings: 'FILL' 1;">star</span>
                                    <span class="text-xs font-bold text-on-surface">4.9</span>
                                </div>

                            <p class="text-on-surface-variant text-sm mb-6 line-clamp-2">Ex-FAANG engineer specializing in scalable microservices and high-performance React applications.</p>

                                 data-alt="Close-up portrait of a professional woman technologist looking confident, neutral background, cinematic soft key lighting" 
                                 class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                        </div>
                        <div class="p-8">
                            <div class="flex justify-between items-start mb-4">

                                    <h4 class="font-headline text-xl font-bold text-on-surface">Sarah Chen</h4>
                                    <p class="text-xs text-on-surface-variant font-medium">Machine Learning Engineer</p>

                                    <span class="material-symbols-outlined text-sm text-tertiary" style="font-variation-settings: 'FILL' 1;">star</span>
                                    <span class="text-xs font-bold text-on-surface">5.0</span>
                                </div>

                            <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&q=80&w=600" 
                                 data-alt="Portrait of a male tech professional in a modern blazer standing in a glass-walled office with city skyline in soft bokeh background" 
                                 class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                        </div>
                        <div class="p-8">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h4 class="font-headline text-xl font-bold text-on-surface">Marcus Thorne</h4>
                                    <p class="text-xs text-on-surface-variant font-medium">Mobile Architect</p>
                                </div>
                                <div class="flex items-center gap-1 bg-surface-container px-2 py-1 rounded">
                                    <span class="material-symbols-outlined text-sm text-tertiary" style="font-variation-settings: 'FILL' 1;">star</span>
                                    <span class="text-xs font-bold text-on-surface">4.8</span>
                                </div>
                            </div>
                            <p class="text-on-surface-variant text-sm mb-6 line-clamp-2">10+ years building high-performance iOS and Android applications for fintech and healthtech giants.</p>
                            <div class="flex flex-wrap gap-2">
                                <span class="bg-secondary-fixed text-on-secondary-fixed text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter">Swift</span>
                                <span class="bg-secondary-fixed text-on-secondary-fixed text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter">Kotlin</span>
                                <span class="bg-secondary-fixed text-on-secondary-fixed text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter">Flutter</span>
                            </div>
                        </div>
                    </div>

        <section class="py-24 max-w-7xl mx-auto px-6">
            <div class="hero-gradient rounded-3xl p-12 lg:p-20 text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -mr-32 -mt-32"></div>
                <div class="absolute bottom-0 left-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -ml-32 -mb-32"></div>
                <div class="relative z-10 max-w-3xl mx-auto">

                    <p class="text-white/80 text-lg mb-12">Whether you're looking for an expert developer or your next big role, SimplyBridge is your platform for excellence.</p>
                    <div class="flex flex-col sm:flex-row justify-center gap-6">
                        <button onclick="window.location.href='developer_directory.html'" class="bg-white text-primary px-10 py-4 rounded-lg font-bold text-sm tracking-wide shadow-xl hover:bg-surface-container transition-all">
                            Find a Developer
                        </button>
                        <button onclick="window.location.href='register.html'" class="bg-primary-container/40 border border-white/20 text-white px-10 py-4 rounded-lg font-bold text-sm tracking-wide hover:bg-primary-container/60 transition-all">

                        </button>
                    </div>
                </div>
            </div>

    <!-- Footer -->
    <footer class="bg-slate-50 dark:bg-slate-950 border-t border-slate-200/50 dark:border-slate-800/50">
        <div class="w-full py-12 px-6 flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto">
            <div class="mb-8 md:mb-0">
                <div class="text-lg font-bold text-blue-900 dark:text-blue-50 font-headline mb-2">SimplyBridge</div>
                <p class="font-['Inter'] text-xs text-slate-500 dark:text-slate-400">© 2024 SimplyBridge. All rights reserved.</p>
            </div>
            
            <div class="flex flex-wrap justify-center gap-8">
                <a href="#" class="font-['Inter'] text-xs text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors">Privacy</a>
